<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>Konsole Analyzer Logo</title>
  <desc>Minimal flat logo icon with three vertical bars of varying heights representing signal strength</desc>
  
  <!-- Background: cream white #f5f5ec -->
  <rect width="256" height="256" fill="#f5f5ec"/>
  
  <!-- Three vertical bars: terracotta #cc532b -->
  <!-- Bar dimensions: 36px wide with 24px gaps, centered horizontally -->
  <!-- Bar positions: x=64, x=110, x=156 (36px bars + 24px gaps) -->
  <!-- Bottom alignment at y=200, top varies by height -->
  <!-- Full height bar: 160px (from y=40 to y=200) -->
  <!-- Using rx=4 for slightly rounded tops -->
  
  <!-- Left bar: 40% height = 64px -->
  <rect x="64" y="136" width="36" height="64" rx="4" fill="#cc532b"/>
  
  <!-- Middle bar: 100% height = 160px -->
  <rect x="110" y="40" width="36" height="160" rx="4" fill="#cc532b"/>
  
  <!-- Right bar: 70% height = 112px -->
  <rect x="156" y="88" width="36" height="112" rx="4" fill="#cc532b"/>
</svg>